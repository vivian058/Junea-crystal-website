<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庫存表 - 玖釀</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .inventory-section-title {
      font-size: 15px; font-weight: 700; color: var(--primary-dark);
      margin: 24px 0 12px;
    }
    .qty-big { font-size: 18px; font-weight: 800; }
    .qty-ok { color: var(--success); }
    .qty-warn { color: var(--warning); }
    .qty-danger { color: var(--danger); }
    .action-btns { display: flex; gap: 6px; flex-wrap: nowrap; }
    .log-toggle {
      background: none; border: none; cursor: pointer;
      font-size: 12px; color: var(--primary); padding: 2px 6px;
      border-radius: 4px; white-space: nowrap;
    }
    .log-toggle:hover { background: var(--primary-light); }
    .log-sub-row td { padding: 0 !important; border-top: none !important; }
    .log-inner { background: #faf6ff; border-top: 1px dashed var(--border); }
    .log-inner table { border: none; }
    .log-inner thead th {
      background: #ede5f8; font-size: 12px; padding: 7px 14px;
      color: var(--primary-dark);
    }
    .log-inner tbody td {
      font-size: 12px; padding: 7px 14px;
      color: var(--text-muted); border-top: 1px solid #ede5f8;
    }
    .log-empty { padding: 12px 14px; font-size: 12px; color: var(--text-muted); text-align: center; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="container">
    <div class="flex-between mb-20">
      <div class="page-title">庫存表</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="openPriceModal()">售價設定</button>
        <button class="btn btn-secondary" onclick="openModal('returnModal')">退貨回庫</button>
        <button class="btn btn-gold" onclick="openModal('shipModal')">出貨扣庫存</button>
      </div>
    </div>

    <!-- 低庫存警示區 -->
    <div id="low-stock-alerts"></div>

    <!-- 搜尋 -->
    <div class="search-area" style="margin-bottom:16px">
      <div class="search-row">
        <div class="form-group" style="flex:1">
          <label>搜尋規格名稱</label>
          <input class="form-control" id="f-keyword" type="text" placeholder="輸入關鍵字…" oninput="filterInventory()">
        </div>
        <button class="btn btn-secondary" onclick="document.getElementById('f-keyword').value='';filterInventory()">清除</button>
      </div>
    </div>

    <!-- 水晶庫存 -->
    <div class="flex-between" style="margin:24px 0 12px">
      <div class="inventory-section-title" style="margin:0">水晶庫存</div>
      <button class="btn btn-secondary btn-sm" onclick="runSyncCrystal()">水晶進貨更新</button>
    </div>
    <div class="card">
      <div id="crystal-table">
        <div class="loading"><div class="spinner"></div><div>載入中...</div></div>
      </div>
    </div>

    <!-- 配件庫存 -->
    <div class="flex-between" style="margin:24px 0 12px">
      <div class="inventory-section-title" style="margin:0">配件庫存</div>
      <button class="btn btn-secondary btn-sm" onclick="runSyncAccessory()">配件進貨更新</button>
    </div>
    <div class="card">
      <div id="accessory-table">
        <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">
          配件庫存目前由系統自動追蹤（根據設計款出貨扣除）
        </div>
      </div>
    </div>
  </div>

  <!-- 編輯調整紀錄 Modal -->
  <div class="modal-overlay" id="editLogModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <div class="modal-title">編輯調整紀錄</div>
        <button class="modal-close" onclick="closeModal('editLogModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-16">
          <label class="required">數量</label>
          <input class="form-control" id="elog-amount" type="number" min="0">
        </div>
        <div class="form-group">
          <label>備註</label>
          <input class="form-control" id="elog-note" type="text">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('editLogModal')">取消</button>
        <button class="btn btn-primary" onclick="submitEditLog()">儲存</button>
      </div>
    </div>
  </div>

  <!-- 水晶進貨更新日期 Modal -->
  <div class="modal-overlay" id="syncDateModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <div class="modal-title">水晶進貨更新</div>
        <button class="modal-close" onclick="closeModal('syncDateModal')">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
          選擇進貨日期，系統將依該日期水晶成本記錄，按初始庫存設定累加對應庫存，並寫入補貨紀錄。
        </p>
        <div class="form-group">
          <label class="required">進貨日期</label>
          <input class="form-control" id="sync-date" type="date">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('syncDateModal')">取消</button>
        <button class="btn btn-primary" onclick="confirmSyncCrystal()">確認更新</button>
      </div>
    </div>
  </div>

  <!-- 調整庫存 Modal -->
  <div class="modal-overlay" id="adjustModal">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <div class="modal-title">調整庫存</div>
        <button class="modal-close" onclick="closeModal('adjustModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-16">
          <label>規格</label>
          <input class="form-control readonly" id="adj-spec" readonly>
        </div>
        <div id="adj-current" style="font-size:13px;color:var(--text-muted);margin-bottom:16px"></div>
        <div class="form-group mb-16">
          <label class="required">調整方式</label>
          <div style="display:flex;gap:16px;margin-top:6px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="adj-type" value="damage" onchange="onAdjTypeChange()"> 耗損扣除
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="adj-type" value="restock" onchange="onAdjTypeChange()"> 手動補入
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="adj-type" value="set" onchange="onAdjTypeChange()"> 直接設定總量
            </label>
          </div>
        </div>
        <div class="form-group mb-16">
          <label class="required" id="adj-amount-label">扣除顆數</label>
          <input class="form-control" id="adj-amount" type="number" min="0" placeholder="輸入數量">
        </div>
        <div class="form-group">
          <label>備註</label>
          <input class="form-control" id="adj-note" type="text" placeholder="如：破損、進貨、修正…">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('adjustModal')">取消</button>
        <button class="btn btn-primary" onclick="submitAdjust()">確認</button>
      </div>
    </div>
  </div>

  <!-- 出貨 Modal -->
  <div class="modal-overlay" id="shipModal">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <div class="modal-title">出貨扣庫存</div>
        <button class="modal-close" onclick="closeModal('shipModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-20">
          <label class="required">手鍊名稱</label>
          <input class="form-control" id="ship-name" type="text" placeholder="輸入設計款手鍊名稱（需完全一致）">
        </div>
        <div class="form-group mb-20">
          <label class="required">出貨數量（條）</label>
          <input class="form-control" id="ship-qty" type="number" min="1" value="1">
        </div>
        <div id="ship-result"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('shipModal')">取消</button>
        <button class="btn btn-gold" onclick="submitShipment()">確認出貨</button>
      </div>
    </div>
  </div>

  <!-- 退貨回庫 Modal -->
  <div class="modal-overlay" id="returnModal">
    <div class="modal" style="max-width:480px">
      <div class="modal-header">
        <div class="modal-title">退貨回庫</div>
        <button class="modal-close" onclick="closeModal('returnModal')">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
          輸入手鍊名稱與退貨數量，系統將自動把對應的水晶和配件庫存全部加回。
        </p>
        <div class="form-group mb-20">
          <label class="required">手鍊名稱</label>
          <input class="form-control" id="return-name" type="text" placeholder="輸入設計款手鍊名稱（需完全一致）">
        </div>
        <div class="form-group mb-20">
          <label class="required">退貨數量（條）</label>
          <input class="form-control" id="return-qty" type="number" min="1" value="1">
        </div>
        <div id="return-result"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('returnModal')">取消</button>
        <button class="btn btn-primary" onclick="submitReturn()">確認退貨回庫</button>
      </div>
    </div>
  </div>

  <!-- 售價設定 Modal -->
  <div class="modal-overlay" id="priceModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <div class="modal-title">售價設定</div>
        <button class="modal-close" onclick="closeModal('priceModal')">✕</button>
      </div>
      <div class="modal-body">
        <div id="price-content"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('priceModal')">關閉</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="inventory.js"></script>
</body>
</html>
