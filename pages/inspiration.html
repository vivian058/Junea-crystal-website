<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>靈感收藏 - 玖釀</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .insp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .insp-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .insp-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .insp-card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }
    .insp-card-img-placeholder {
      width: 100%;
      height: 200px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-dark);
      font-size: 13px;
    }
    .insp-card-body { padding: 12px 14px 14px; }
    .insp-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
    .insp-card-notes { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .insp-card-mat-count { font-size: 12px; color: var(--primary-dark); margin-top: 8px; }
    .insp-card-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* 詳情 Modal 橫版 */
    .detail-modal-inner { display: flex; height: 100%; min-height: 0; }
    .detail-img-col {
      width: 45%;
      flex-shrink: 0;
      border-radius: var(--radius) 0 0 var(--radius);
      overflow: hidden;
      background: #f0f0f0;
    }
    .detail-img-col img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .detail-img-col-empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; }
    .detail-info-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .detail-info-scroll { flex: 1; overflow-y: auto; padding: 20px 20px 0; }
    .detail-info-footer { padding: 12px 20px; display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid var(--border); flex-shrink: 0; }
    .mat-list { display: flex; flex-direction: column; gap: 8px; }
    .mat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg);
      font-size: 14px;
    }
    .mat-item-name { flex: 1; }
    .mat-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .mat-badge-same { background: #d4edda; color: #2d6a4f; }
    .mat-badge-similar { background: #fff3cd; color: #856404; }
    .mat-badge-none { background: #f0f0f0; color: #888; }
    .mat-badge-zero { background: #fde8e8; color: #c0392b; }
    .mat-section-title { font-weight: 700; font-size: 13px; color: var(--primary-dark); margin: 14px 0 6px; }

    /* 新增/編輯 Modal 材料選擇區 */
    .mat-selector { border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
    .mat-selector-search { display: flex; gap: 6px; margin-bottom: 8px; }
    .mat-selector-search input { flex: 1; }
    .mat-selector-results {
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .mat-selector-option {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .mat-selector-option:hover { background: var(--primary-light); }
    .mat-selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 28px; }
    .mat-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 12px;
      padding: 3px 10px 3px 10px;
      border-radius: 20px;
    }
    .mat-tag-manual { background: #fff3cd; color: #856404; }
    .mat-tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
    }
    .mat-tag-remove:hover { opacity: 1; }

    /* 頁面色系篩選標籤 */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .filter-tag {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-tag:hover { border-color: var(--primary); color: var(--primary-dark); }
    .filter-tag.active { background: var(--primary); border-color: var(--primary); color: white; }
    .filter-clear { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: none; font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .filter-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* 色系多選下拉（新增modal用） */
    .color-picker-wrap { position: relative; }
    .color-picker-trigger {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      background: white;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      font-size: 14px;
    }
    .color-picker-trigger.open { border-color: var(--primary); }
    .color-picker-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-hover);
      z-index: 200;
      padding: 10px;
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    .color-picker-dropdown.open { display: grid; }
    .color-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .color-opt:hover { background: var(--primary-light); }
    .color-opt input[type=checkbox] { accent-color: var(--primary); width: 14px; height: 14px; cursor: pointer; }
    .color-selected-tag { font-size: 12px; font-weight: 700; color: var(--text); background: none; padding: 0; }
    .manual-input-row { display: flex; gap: 6px; margin-top: 8px; align-items: flex-end; flex-wrap: wrap; }
    .manual-input-row .manual-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 90px; }
    .manual-input-row .manual-field label { font-size: 11px; color: var(--text-muted); margin: 0; }
    .manual-input-row .manual-field input { width: 100%; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="container">
    <div class="flex-between mb-20">
      <div class="page-title">靈感收藏</div>
      <div style="display:flex;gap:8px">
        <a href="https://postimages.org/" target="_blank" rel="noopener" class="btn btn-secondary">圖片上傳取址</a>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增收藏</button>
      </div>
    </div>

    <div class="filter-bar" id="filter-bar"></div>

    <div id="insp-container">
      <div class="loading"><div class="spinner"></div><div>載入中...</div></div>
    </div>
  </div>

  <!-- 詳情 Modal 橫版 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:820px;padding:0;overflow:hidden;display:flex;flex-direction:column;max-height:90vh">
      <div class="detail-modal-inner" style="flex:1;min-height:0">
        <div class="detail-img-col" id="detail-img-col"></div>
        <div class="detail-info-col">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
            <div style="font-weight:700;font-size:16px">作品詳情</div>
            <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
          </div>
          <div class="detail-info-scroll" id="detail-body"></div>
          <div class="detail-info-footer">
            <button class="btn btn-secondary" onclick="closeModal('detailModal')">關閉</button>
            <button class="btn btn-secondary" id="detail-edit-btn">編輯</button>
            <button class="btn btn-danger" id="detail-delete-btn">刪除</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal" style="max-width:620px">
      <div class="modal-header">
        <div class="modal-title" id="edit-modal-title">＋ 新增收藏</div>
        <button class="modal-close" onclick="closeModal('editModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group" style="grid-column:1/-1">
            <label>圖片網址</label>
            <input class="form-control" id="f-imageUrl" type="url" placeholder="貼上圖片直連網址（右鍵圖片 → 複製圖片網址）">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>來源連結</label>
            <input class="form-control" id="f-sourceUrl" type="url" placeholder="作品出處（貼文/帳號網址）">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>色系</label>
            <div class="color-picker-wrap">
              <div class="color-picker-trigger" id="color-trigger" onclick="toggleColorPicker()">
                <span id="color-trigger-placeholder" style="color:var(--text-muted)">點擊選擇色系（可多選）</span>
              </div>
              <div class="color-picker-dropdown" id="color-dropdown">
                <label class="color-opt"><input type="checkbox" value="紅色系"> 紅色系</label>
                <label class="color-opt"><input type="checkbox" value="橙色系"> 橙色系</label>
                <label class="color-opt"><input type="checkbox" value="黃色系"> 黃色系</label>
                <label class="color-opt"><input type="checkbox" value="綠色系"> 綠色系</label>
                <label class="color-opt"><input type="checkbox" value="藍色系"> 藍色系</label>
                <label class="color-opt"><input type="checkbox" value="紫色系"> 紫色系</label>
                <label class="color-opt"><input type="checkbox" value="粉色系"> 粉色系</label>
                <label class="color-opt"><input type="checkbox" value="白色系"> 白色系</label>
                <label class="color-opt"><input type="checkbox" value="黑色系"> 黑色系</label>
                <label class="color-opt"><input type="checkbox" value="棕色系"> 棕色系</label>
                <label class="color-opt"><input type="checkbox" value="灰色系"> 灰色系</label>
                <label class="color-opt"><input type="checkbox" value="透明系"> 透明系</label>
                <label class="color-opt"><input type="checkbox" value="多色系"> 多色系</label>
                <label class="color-opt"><input type="checkbox" value="珍珠"> 珍珠</label>
                <label class="color-opt"><input type="checkbox" value="米珠"> 米珠</label>
                <label class="color-opt"><input type="checkbox" value="深色系"> 深色系</label>
                <label class="color-opt"><input type="checkbox" value="淺色系"> 淺色系</label>
              </div>
            </div>
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>備註</label>
            <textarea class="form-control" id="f-notes" placeholder="配色說明、製作方式、進貨參考等…" style="height:72px"></textarea>
          </div>
        </div>

        <!-- 水晶材料 -->
        <div class="mat-section-title">水晶材料</div>
        <div class="mat-selector">
          <div class="mat-selector-search">
            <input class="form-control" id="crystal-search" type="text" placeholder="搜尋庫存水晶…" oninput="searchCrystal(this.value)">
          </div>
          <div class="mat-selector-results" id="crystal-results"></div>
          <div class="mat-selected-tags" id="crystal-selected"></div>
          <div class="manual-input-row">
            <div class="manual-field">
              <label>水晶名稱</label>
              <input class="form-control" id="crystal-manual-name" type="text" list="dl-crystal-name" placeholder="如：白水晶" autocomplete="off">
              <datalist id="dl-crystal-name"></datalist>
            </div>
            <div class="manual-field" style="max-width:100px">
              <label>尺寸</label>
              <input class="form-control" id="crystal-manual-size" type="text" list="dl-crystal-size" placeholder="如：8mm" autocomplete="off">
              <datalist id="dl-crystal-size"></datalist>
            </div>
            <div class="manual-field">
              <label>形狀</label>
              <input class="form-control" id="crystal-manual-shape" type="text" list="dl-crystal-shape" placeholder="如：圓珠" autocomplete="off">
              <datalist id="dl-crystal-shape"></datalist>
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-bottom:1px" onclick="addManualCrystal()">新增</button>
          </div>
        </div>

        <!-- 配件材料 -->
        <div class="mat-section-title">配件材料</div>
        <div class="mat-selector">
          <div class="mat-selector-search">
            <input class="form-control" id="acc-search" type="text" placeholder="搜尋庫存配件…" oninput="searchAccessory(this.value)">
          </div>
          <div class="mat-selector-results" id="acc-results"></div>
          <div class="mat-selected-tags" id="acc-selected"></div>
          <div class="manual-input-row">
            <div class="manual-field">
              <label>配件名稱</label>
              <input class="form-control" id="acc-manual-name" type="text" list="dl-acc-name" placeholder="如：彈力繩" autocomplete="off">
              <datalist id="dl-acc-name"></datalist>
            </div>
            <div class="manual-field" style="max-width:100px">
              <label>尺寸</label>
              <input class="form-control" id="acc-manual-size" type="text" list="dl-acc-size" placeholder="如：3mm" autocomplete="off">
              <datalist id="dl-acc-size"></datalist>
            </div>
            <div class="manual-field" style="max-width:110px">
              <label>顏色</label>
              <input class="form-control" id="acc-manual-color" type="text" list="dl-acc-color" placeholder="如：銀色" autocomplete="off">
              <datalist id="dl-acc-color">
                <option value="銀色"><option value="金色"><option value="玫瑰金">
                <option value="黑色"><option value="白色"><option value="透明">
              </datalist>
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-bottom:1px" onclick="addManualAccessory()">新增</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('editModal')">取消</button>
        <button class="btn btn-primary" id="edit-save-btn" onclick="submitInspiration()">儲存</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="inspiration.js"></script>
</body>
</html>
