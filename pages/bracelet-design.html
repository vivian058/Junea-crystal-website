<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計款手鍊 - 玖釀</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .design-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .design-card {
      background: white; border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px; border: 2px solid transparent; transition: all 0.2s;
    }
    .design-card:hover { border-color: var(--primary-light); }
    .design-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .design-card-name { font-size: 16px; font-weight: 700; color: var(--primary-dark); }
    .design-card-cost { font-size: 20px; font-weight: 800; color: var(--secondary); }
    .design-card-alert { margin: 8px 0; }
    .material-summary { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
    .material-row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--border); }
    .selector-area { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; }
    .selector-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .cost-section-title { font-size: 13px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px; border-left: 3px solid var(--primary); padding-left: 8px; }
    .cost-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
    .cost-row-label { font-size: 13px; color: var(--text-muted); }
    .cost-row-value { font-size: 15px; font-weight: 700; }
    .cost-add-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px; }
    .cost-add-row .form-group { flex: 1; margin-bottom: 0; }
    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 2px solid var(--border); margin-top: 8px; }
    .profit-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 16px; margin-top: 10px; }
    .profit-inputs { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 10px; flex-wrap: wrap; }
    .profit-result { border-top: 1px solid var(--border); margin-top: 8px; padding-top: 8px; }
    .suggested-price-box { background: var(--primary-light); border-radius: 6px; padding: 10px 14px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }

    /* Autocomplete */
    .ac-wrap { position: relative; flex: 3; }
    .ac-dropdown {
      display: none; position: absolute; z-index: 2000;
      background: white; border: 1px solid var(--border);
      border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.13);
      max-height: 220px; overflow-y: auto; width: 100%; top: calc(100% + 2px); left: 0;
    }
    /* 鍊條線材的 dropdown 向上展開，避免被 modal 底部截斷 */
    #ch-dropdown { top: auto; bottom: calc(100% + 2px); box-shadow: 0 -4px 16px rgba(0,0,0,0.13); }
    .ac-item {
      padding: 8px 12px; cursor: pointer; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border); line-height: 1.4;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: var(--bg); }
    .ac-selected {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      background: var(--primary-light); border-radius: 6px; font-size: 13px;
      margin-top: 6px;
    }
    .ac-selected-name { flex: 1; color: var(--primary-dark); font-weight: 600; }
    .ac-selected-cost { color: var(--secondary); font-weight: 700; }
    .ac-selected-clear { cursor: pointer; color: var(--text-muted); padding: 0 4px; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="container">
    <div class="flex-between mb-20">
      <div class="page-title">設計款手鍊</div>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新增設計款</button>
    </div>
    <div id="designs-container">
      <div class="loading"><div class="spinner"></div><div>載入中...</div></div>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal-overlay" id="designModal">
    <div class="modal" style="max-width:820px">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增設計款手鍊</div>
        <button class="modal-close" onclick="closeModal('designModal')">✕</button>
      </div>
      <div class="modal-body">

        <!-- 基本資料 -->
        <div class="form-grid" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
          <div class="form-group" style="margin-bottom:0">
            <label class="required">手鍊名稱</label>
            <input class="form-control" id="d-name" type="text" placeholder="如：白水晶三圈手鍊">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label>圖片連結</label>
            <input class="form-control" id="d-imageUrl" type="url" placeholder="商品圖片網址">
          </div>
        </div>

        <!-- ① 材料清單（水晶 / 配件）-->
        <div class="cost-section-title">① 材料清單（水晶 / 配件）</div>
        <div class="selector-area">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">新增材料</div>
          <div class="selector-row">
            <div class="ac-wrap">
              <label style="font-size:13px;display:block;margin-bottom:4px">選擇品項（輸入貨號或名稱）</label>
              <input class="form-control" id="m-input" type="text" placeholder="輸入貨號或品名搜尋…"
                     oninput="showMaterialSuggestions()" onfocus="showMaterialSuggestions()" autocomplete="off">
              <div class="ac-dropdown" id="m-dropdown"></div>
              <div class="ac-selected" id="m-selected" style="display:none">
                <span class="ac-selected-name" id="m-selected-name"></span>
                <span class="ac-selected-cost" id="m-selected-cost-label"></span>
                <span class="ac-selected-clear" onclick="clearMaterialSelection()">✕</span>
              </div>
            </div>
            <div class="form-group" style="flex:1;min-width:80px;margin-bottom:0">
              <label>使用顆數</label>
              <input class="form-control" id="m-qty" type="number" min="1" placeholder="顆數">
            </div>
            <button class="btn btn-secondary" onclick="addMaterialRow()" style="align-self:flex-end;white-space:nowrap">＋ 加入</button>
          </div>
        </div>
        <div id="material-list" style="margin-bottom:8px"></div>
        <div class="cost-row" style="border-top:1.5px solid var(--border);padding-top:10px">
          <div class="cost-row-label" style="font-weight:600">商品總成本</div>
          <div class="cost-row-value" style="font-size:18px;color:var(--secondary)" id="material-cost-preview">$0</div>
        </div>

        <hr class="divider">

        <!-- ② 鍊條線材成本 -->
        <div class="cost-section-title">② 鍊條線材成本</div>
        <div class="selector-area">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">新增鍊條線材</div>
          <div class="selector-row">
            <div class="ac-wrap">
              <label style="font-size:13px;display:block;margin-bottom:4px">選擇品項（輸入貨號或名稱）</label>
              <input class="form-control" id="ch-input" type="text" placeholder="輸入貨號或品名搜尋…"
                     oninput="showChainSuggestions()" onfocus="showChainSuggestions()" autocomplete="off">
              <div class="ac-dropdown" id="ch-dropdown"></div>
              <div class="ac-selected" id="ch-selected" style="display:none">
                <span class="ac-selected-name" id="ch-selected-name"></span>
                <span class="ac-selected-cost" id="ch-selected-cost-label"></span>
                <span class="ac-selected-clear" onclick="clearChainSelection()">✕</span>
              </div>
            </div>
            <div class="form-group" style="flex:1;min-width:80px;margin-bottom:0">
              <label>使用長度 (cm)</label>
              <input class="form-control" id="ch-cm" type="number" min="0.1" step="0.1" placeholder="cm">
            </div>
            <button class="btn btn-secondary" onclick="addChainRow()" style="align-self:flex-end;white-space:nowrap">＋ 加入</button>
          </div>
        </div>
        <div id="chain-list" style="margin-bottom:8px"></div>
        <div class="cost-row" style="border-top:1.5px solid var(--border);padding-top:10px">
          <div class="cost-row-label" style="font-weight:600">鍊條線材小計</div>
          <div class="cost-row-value" style="font-size:18px;color:var(--secondary)" id="chain-cost-preview">$0</div>
        </div>

        <hr class="divider">

        <!-- ③ 產品包裝成本 -->
        <div class="cost-section-title">③ 產品包裝成本</div>
        <div id="packaging-list" style="margin-bottom:8px"></div>
        <div class="cost-add-row">
          <div class="form-group">
            <label>項目名稱</label>
            <input class="form-control" id="pkg-name" type="text" placeholder="如：禮盒、緞帶、貼紙">
          </div>
          <div class="form-group" style="max-width:140px">
            <label>成本 ($)</label>
            <input class="form-control" id="pkg-cost" type="number" step="0.01" placeholder="0.00">
          </div>
          <button class="btn btn-secondary" onclick="addPackagingItem()" style="white-space:nowrap">＋ 加入</button>
        </div>
        <div class="cost-row">
          <div class="cost-row-label">包裝小計</div>
          <div class="cost-row-value" id="packaging-cost-preview">$0</div>
        </div>

        <hr class="divider">

        <!-- ④ 金物流平台成本 -->
        <div class="cost-section-title">④ 金物流平台成本</div>
        <div id="logistics-list" style="margin-bottom:8px"></div>
        <div class="cost-add-row">
          <div class="form-group">
            <label>項目名稱</label>
            <input class="form-control" id="log-name" type="text" placeholder="如：蝦皮手續費、運費補貼">
          </div>
          <div class="form-group" style="max-width:140px">
            <label>成本 ($)</label>
            <input class="form-control" id="log-cost" type="number" step="0.01" placeholder="0.00">
          </div>
          <button class="btn btn-secondary" onclick="addLogisticsItem()" style="white-space:nowrap">＋ 加入</button>
        </div>
        <div class="cost-row">
          <div class="cost-row-label">物流平台小計</div>
          <div class="cost-row-value" id="logistics-cost-preview">$0</div>
        </div>

        <hr class="divider">

        <!-- 全部加總 -->
        <div class="total-row">
          <div style="font-size:15px;font-weight:700">全部加總成本</div>
          <div style="font-size:22px;font-weight:800;color:var(--secondary)" id="total-cost-preview">$0</div>
        </div>

        <hr class="divider">

        <!-- 售價 / 毛利 -->
        <div class="profit-box">
          <div class="profit-inputs">
            <div class="form-group" style="margin-bottom:0;max-width:180px">
              <label style="font-size:13px;font-weight:600">預估售價 ($)</label>
              <input class="form-control" id="d-sellingPrice" type="number" step="1" placeholder="輸入售價" oninput="updateProfitCalc()">
            </div>
            <div class="form-group" style="margin-bottom:0;max-width:180px">
              <label style="font-size:13px;font-weight:600">目標毛利率 (%)</label>
              <input class="form-control" id="d-targetMargin" type="number" step="0.1" min="0" max="99" placeholder="如：30" oninput="calcPriceFromMargin()">
            </div>
          </div>
          <div id="profit-section" style="display:none" class="profit-result">
            <div class="cost-row" style="padding:4px 0">
              <div class="cost-row-label">毛利</div>
              <div class="cost-row-value" id="profit-preview">-</div>
            </div>
            <div class="cost-row" style="padding:4px 0">
              <div class="cost-row-label">毛利率</div>
              <div class="cost-row-value" id="margin-preview">-</div>
            </div>
          </div>
          <div id="suggested-section" style="display:none">
            <div class="suggested-price-box">
              <div style="font-size:13px;font-weight:600;color:var(--primary-dark)">建議售價（依目標毛利率）</div>
              <div style="font-size:20px;font-weight:800;color:var(--primary-dark)" id="suggested-price-preview">-</div>
            </div>
          </div>
        </div>

        <!-- 製作備註（獨立區塊） -->
        <div style="margin-top:12px">
          <div style="font-size:13px;font-weight:700;color:var(--primary-dark);margin-bottom:8px">製作備註</div>
          <div id="notes-list" style="margin-bottom:10px"></div>
          <div style="display:flex;gap:8px;align-items:flex-end">
            <div class="form-group" style="margin-bottom:0;max-width:150px">
              <label style="font-size:12px">日期</label>
              <input class="form-control" id="note-date" type="date">
            </div>
            <div class="form-group" style="flex:1;margin-bottom:0">
              <label style="font-size:12px">備註內容</label>
              <input class="form-control" id="note-input" type="text" placeholder="輸入備註內容…">
            </div>
            <button class="btn btn-secondary" onclick="addNote()" style="white-space:nowrap;align-self:flex-end">＋ 加入</button>
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('designModal')">取消</button>
        <button class="btn btn-primary" id="save-btn" onclick="submitDesign()">儲存設計款</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js?v=2"></script>
  <script src="../js/utils.js"></script>
  <script src="bracelet-design.js?v=14"></script>
</body>
</html>
