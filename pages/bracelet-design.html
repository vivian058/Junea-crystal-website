<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計款手鍊 - 玖釀</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .design-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .design-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .design-card:hover { border-color: var(--primary-light); }
    .design-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .design-card-name { font-size: 16px; font-weight: 700; color: var(--primary-dark); }
    .design-card-cost { font-size: 20px; font-weight: 800; color: var(--secondary); }
    .design-card-base { font-size: 12px; color: var(--text-muted); }
    .design-card-alert { margin: 8px 0; }
    .material-summary { font-size: 13px; color: var(--text-muted); margin-top: 10px; }
    .material-row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid var(--border); }
    .selector-area { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px; }
    .selector-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .selector-row .form-group { flex: 1; min-width: 160px; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="container">
    <div class="flex-between mb-20">
      <div class="page-title">設計款手鍊</div>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新增設計款</button>
    </div>

    <div id="designs-container">
      <div class="loading"><div class="spinner"></div><div>載入中...</div></div>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal-overlay" id="designModal">
    <div class="modal" style="max-width:780px">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增設計款手鍊</div>
        <button class="modal-close" onclick="closeModal('designModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group mb-20">
          <label class="required">手鍊名稱</label>
          <input class="form-control" id="d-name" type="text" placeholder="如：白水晶三圈手鍊、粉晶配金隔珠">
        </div>

        <div class="card-title">材料清單</div>

        <!-- 選料區 -->
        <div class="selector-area">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text-muted)">新增材料</div>
          <div class="selector-row">
            <div class="form-group">
              <label>類型</label>
              <select class="form-control" id="m-type" onchange="updateMaterialOptions()">
                <option value="crystal">水晶</option>
                <option value="accessory">配件</option>
              </select>
            </div>
            <div class="form-group" style="flex:2">
              <label>選擇品項</label>
              <select class="form-control" id="m-item">
                <option value="">-- 先選類型 --</option>
              </select>
            </div>
            <div class="form-group">
              <label>使用顆數</label>
              <input class="form-control" id="m-qty" type="number" min="1" placeholder="顆數" style="width:90px">
            </div>
            <button class="btn btn-secondary" onclick="addMaterialRow()" style="align-self:flex-end">＋ 加入</button>
          </div>
        </div>

        <!-- 已加入的材料 -->
        <div id="material-list" class="material-list"></div>

        <hr class="divider">
        <div class="flex-between">
          <div style="font-size:14px;color:var(--text-muted)">預估總成本</div>
          <div style="font-size:22px;font-weight:800;color:var(--secondary)" id="total-cost-preview">$0</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('designModal')">取消</button>
        <button class="btn btn-primary" id="save-btn" onclick="submitDesign()">儲存設計款</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="bracelet-design.js"></script>
</body>
</html>
