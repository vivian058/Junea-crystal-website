<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初始庫存設定 - 玖釀</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .opt-manager { margin-top: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: none; }
    .opt-manager.open { display: block; }
    .opt-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 24px; }
    .opt-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--primary-light); color: var(--primary-dark); font-size: 12px; padding: 3px 10px; border-radius: 20px; }
    .opt-tag-del { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
    .opt-tag-del:hover { opacity: 1; }
    .opt-add-row { display: flex; gap: 6px; }
    .opt-add-row input { flex: 1; }
    .opt-toggle { font-size: 11px; color: var(--primary); cursor: pointer; margin-top: 4px; display: inline-block; background: none; border: none; padding: 0; }
    .opt-toggle:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="container">
    <div class="flex-between mb-20">
      <div class="page-title">初始庫存設定</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="openModal('addModal')">＋ 新增水晶設定</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;background:var(--primary-light)">
      <div style="font-size:14px;color:var(--primary-dark)">
        <strong>說明：</strong>設定各規格每次進貨的預設顆數。儲存後庫存表會自動建立對應項目。
      </div>
    </div>

    <div class="card">
      <div id="table-container">
        <div class="loading"><div class="spinner"></div><div>載入中...</div></div>
      </div>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal" style="max-width:540px">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">＋ 新增規格設定</div>
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="required">尺寸 (mm)</label>
            <input class="form-control" id="s-size" type="text" list="dl-is-size" placeholder="選擇或輸入" autocomplete="off">
            <datalist id="dl-is-size"></datalist>
            <button type="button" class="opt-toggle" onclick="toggleOptManager('size-mgr')">編輯選項 ▾</button>
            <div class="opt-manager" id="size-mgr">
              <div class="opt-tags" id="size-tags"></div>
              <div class="opt-add-row">
                <input class="form-control" id="size-new-opt" type="text" placeholder="新增選項…">
                <button class="btn btn-secondary btn-sm" onclick="addOpt('crystalSizes','size-new-opt')">新增</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="required">規格 A</label>
            <input class="form-control" id="s-typeA" type="text" list="dl-is-typeA" placeholder="選擇或輸入" autocomplete="off">
            <datalist id="dl-is-typeA"></datalist>
            <button type="button" class="opt-toggle" onclick="toggleOptManager('typeA-mgr')">編輯選項 ▾</button>
            <div class="opt-manager" id="typeA-mgr">
              <div class="opt-tags" id="typeA-tags"></div>
              <div class="opt-add-row">
                <input class="form-control" id="typeA-new-opt" type="text" placeholder="新增選項…">
                <button class="btn btn-secondary btn-sm" onclick="addOpt('crystalTypeAs','typeA-new-opt')">新增</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="required">形狀 / 規格 B</label>
            <input class="form-control" id="s-typeB" type="text" list="dl-is-typeB" placeholder="選擇或輸入" autocomplete="off">
            <datalist id="dl-is-typeB"></datalist>
            <button type="button" class="opt-toggle" onclick="toggleOptManager('typeB-mgr')">編輯選項 ▾</button>
            <div class="opt-manager" id="typeB-mgr">
              <div class="opt-tags" id="typeB-tags"></div>
              <div class="opt-add-row">
                <input class="form-control" id="typeB-new-opt" type="text" placeholder="新增選項…">
                <button class="btn btn-secondary btn-sm" onclick="addOpt('crystalTypeBs','typeB-new-opt')">新增</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="required">每次進貨預設顆數</label>
            <input class="form-control" id="s-defaultQty" type="number" min="1" placeholder="如：150">
          </div>
        </div>
      </div>
      <div class="modal-footer" style="flex-direction:column;align-items:stretch;gap:8px">
        <div id="setting-error" style="display:none;color:var(--danger);font-size:13px;padding:0 2px"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button class="btn btn-secondary" onclick="closeModal('addModal')">取消</button>
          <button class="btn btn-primary" onclick="submitSetting()">儲存設定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js"></script>
  <script src="../js/utils.js"></script>
  <script src="initial-stock.js"></script>
</body>
</html>
